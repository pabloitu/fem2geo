solver: adeli

units:
  pressure:    MPa
  distance:    m
  velocity:    cm/a
  time:        Ma

tensors:
  stress:
    components:
      xx: "Stress_xx(MPa)"
      yy: "Stress_yy(MPa)"
      zz: "Stress_zz(MPa)"
      xy: "Stress_xy(MPa)"
      yz: "Stress_yz(MPa)"
      zx: "Stress_zx(MPa)"
    category: pressure

fields:
  # Principal stress magnitudes (deviatoric)
  val_s1: { field: "DevStress_1(MPa)", category: pressure }
  val_s3: { field: "DevStress_3(MPa)", category: pressure }

  # Principal stress directions (ENU unit vectors)
  dir_s1: { field: "dir_DevStress_1" }
  dir_s2: { field: "dir_DevStress_2" }
  dir_s3: { field: "dir_DevStress_3" }

  # Kinematics
  u: { field: "Displacement(m)", category: distance }
  v: { field: "Velocity(cm/a)",  category: velocity }
  t: { field: "TIME(Ma)",        category: time     }

  # Strain invariants
  i1_strain:     { field: "I1_(strain)(-)" }
  j2_strain:     { field: "J2_(strain)(-)" }
  j2_stress:     { field: "J2_(stress)(MPa)", category: pressure }
  plastic_eff:   { field: "Eff._plastic_strain(-)" }
  plastic_vol:   { field: "Vol._plastic_strain(-)" }
  plastic_yield: { field: "jplas(-)" }