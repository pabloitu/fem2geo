job: project

data:
  raster:
    file: ../data/topo_chile.tif
    z_band: 1

src:
  crs: epsg:4326
  xy_units: deg
  z_units: m
  z_positive: up
  bbox:
    lon: [-73.0, -69.0]
    lat: [-21.5, -18.0]

dst:
  units: km
  anchor:
    data:
      lon: -70.929
      lat: -20.17
      depth_km: 18
    model: [0, 0, -12.8]
    rotation_deg: -10

output:
  dir: results/
  file: topo_fem_space.vtp