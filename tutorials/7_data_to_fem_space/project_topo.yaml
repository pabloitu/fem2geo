job: project

data:
  file: ../data/topo_chile.tif
  raster:
    z_band: 1

src:
  crs: epsg:4326
  xy_units: deg
  z_units: m
  z_positive: up
  bbox:
    lon: [-73.0, -69.0]
    lat: [-21.5, -18.0]

dst:
  units: km
  anchor:
    data:
      lon: -71.07
      lat: -20.09
      depth_km: 8
    model: [0, 0, -6]
    rotation_deg: -20

output:
  dir: results/
  file: topo_fem_space.vtp