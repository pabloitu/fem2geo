job: project

data:
  catalog:
    file: ../data/catalog_interface.csv
    columns: [longitude, latitude, depth]

src:
  crs: epsg:4326
  xy_units: deg
  z_units: km
  z_positive: down
  bbox:
    lon: [-73.0, -69.0]
    lat: [-21.5, -18.0]
    depth_km: [0, 70]

dst:
  units: km
  anchor:
    data:
      lon: -71.1
      lat: -20.17
      depth_km: 16
    model: [0, 0, -12.8]
    rotation_deg: -10

output:
  dir: results/
  file: catalog_fem_space.vtp