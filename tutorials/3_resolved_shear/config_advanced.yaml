job: resolved_shear
schema: adeli

model: ../data/model_a.vtu

zone:
  type: sphere
  center: [20, 20, -10]
  radius: 0.5

data:
  faults: ../data/faults.csv

plot:
  title: "Resolved Shear Stress — Observed vs Predicted slip"
  figsize: [9, 9]
  dpi: 300
  fault_planes:
    show: true
    style: poles
    color: "grey"
    alpha: 0.6
  observed_slip:
    color: "green"
    arrowsize: 1.2
    linewidth: 1.5
  predicted_slip:
    color: "lightblue"
    arrowsize: 1.2
    linewidth: 1.5
  avg_directions:
    show: true
    markersize: 10

output:
  save_vtu: false