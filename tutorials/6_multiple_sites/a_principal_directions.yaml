job: sites.principal_directions
schema: adeli

model: ../data/small_box.vtk

sites:
  shallow: {center: [22, 22, -5],  radius: 0.8}
  mid:     {center: [22, 22, -6], radius: 0.5}
  deep:    {center: [22, 22, -7], radius: 0.5}
  base:    {center: [22, 22, -8], radius: 0.5}

plot:
  title: "Principal directions along depth"
  figsize: [12, 12]
  dpi: 200
  avg_directions:
    show: true
    markersize: 10
  cell_directions:
    show: true
    style: contour
    levels: 3
    sigma: 3
    linewidth: 1.5

output:
  figure: principal_directions_profile.png