job: tendency
schema: adeli3
units:
  pressure: MPa

model: ../data/pReveF.2.vtu

zone:
  type: sphere
  center: [7500,7500,-3000]
  radius: 500.0

data:
  Set A: ../data/fractures.csv
  Set B: ../data/fractures_b.csv

plot:
  tendency: combined
  title: "Combined reactivation tendency [0-2] for Reverse case"
  figsize: [10, 10]
  dpi: 300
  n_strikes: 360
  n_dips: 90
  stress_values: True
  avg_directions:
    show: true
    color: "black"
    markersize: 7
  data:
    markersize: 6
    alpha: 0.8

output:
  dir: combined_slip_fracturesAB/
  vtu: extract.vtu
