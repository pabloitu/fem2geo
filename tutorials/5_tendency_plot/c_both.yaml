job: tendency
schema: adeli3
units:
  pressure: MPa

model: ../data/pReveF.2.vtu

zone:
  type: sphere
  center: [7500,7500,-3000]
  radius: 500.0

data:
  Fracture Set: ../data/fractures_b.csv

plot:
  tendency: both
  title: "Slip and dilation tendency for a Reverse case"
  figsize: [18, 8]
  dpi: 200
  cell_directions:
    show: true
    style: scatter
    color: "grey"
    markersize: 3
    alpha: 0.3
  data:
    color: "green"
    markersize: 6
    alpha: 0.6

output:
  dir: both_slip_dilation_fracturesB_Reverse/
  vtu: extract.vtu
