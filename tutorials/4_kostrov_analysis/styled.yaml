job: kostrov
schema: adeli3
tensor: strain_plastic

model: ../data/reverse_fault.vtu

site:
  center: [8000, 6000, -2000]
  radius: 400
  data: ../data/faults.csv

plot:
  title: "Kostrov analysis"
  figsize: [9, 9]
  dpi: 300
  principals:
    color: "#2196F3"
    markersize: 12
  kostrov:
    color: "#E63946"
    markersize: 12
  fault_axes:
    show: true
    color: "gray"
    style: scatter
    markersize: 3
    alpha: 0.3

output:
  dir: styled/