job: tendency
schema: adeli
units:
  pressure: MPa

model: ../data/cavity_model.vtk

zone:
  type: sphere
  center: [24.75, 28.5, -7.3]
  radius: 1.0

data:
  Set A: ../data/fractures.csv
  Set B: ../data/fractures_b.csv

plot:
  tendency: combined
  title: "Combined reactivation tendency"
  figsize: [10, 10]
  dpi: 300
  n_strikes: 360
  n_dips: 90
  avg_directions:
    show: true
    color: "black"
    markersize: 7
  data:
    markersize: 6
    alpha: 0.8

output:
  dir: combined/
  vtu: extract.vtu