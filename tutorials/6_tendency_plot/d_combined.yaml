job: tendency_plot
schema: adeli
units:
  pressure: MPa

model: ../data/cavity_model.vtk

zone:
  type: sphere
  center: [24.75, 28.5, -7.3]
  radius: 1.0

plot:
  tendency: combined
  title: "Combined reactivation tendency"
  figsize: [10, 10]
  dpi: 300
  n_strikes: 360
  n_dips: 90
  avg_directions:
    show: true
    color: "black"
    markersize: 10
    markeredgecolor: "k"
  cell_directions:
    show: true
    style: contour
    color: "grey"
    levels: 5
    sigma: 2.0
    linewidth: 0.8

output:
  dir: results/
  save_vtu: true