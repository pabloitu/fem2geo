 job: tendency_plot
schema: adeli
units:
  pressure: MPa

model: ../data/cavity_model.vtk

zone:
  type: sphere
  center: [24.75, 28.5, -7.3]
  radius: 1.0

plot:
  tendency: both
  figsize: [18, 8]
  avg_directions:
    show: true
    s1: { color: "white", marker: "o", markersize: 10 }
    s2: { color: "white", marker: "s", markersize: 10 }
    s3: { color: "white", marker: "v", markersize: 10 }
  cell_directions:
    show: true
    s1: { color: "r", marker: "o", markersize: 3, alpha: 0.4 }
    s2: { color: "g", marker: "s", markersize: 3, alpha: 0.4 }
    s3: { color: "b", marker: "v", markersize: 3, alpha: 0.4 }

output:
  dir: results/
  save_vtu: true