job: tendency_plot
schema: adeli
units:
  pressure: MPa

model: ../data/cavity_model.vtk

zone:
  type: sphere
  center: [24.75, 28.5, -7.3]
  radius: 1.0

plot:
  tendency: both
  figsize: [18, 8]
  dpi: 200
  cell_directions:
    show: true
    style: scatter
    color: "grey"
    markersize: 3
    alpha: 0.3

output:
  dir: results/
  save_vtu: true