job: tendency
schema: adeli
units:
  pressure: MPa

model: ../data/cavity_model.vtk

zone:
  type: sphere
  center: [24.75, 28.5, -7.3]
  radius: 1.0

data:
  Fracture Set: ../data/fractures_b.csv

plot:
  tendency: both
  figsize: [18, 8]
  dpi: 200
  cell_directions:
    show: true
    style: scatter
    color: "grey"
    markersize: 3
    alpha: 0.3
  data:
    color: "green"
    markersize: 6
    alpha: 0.6

output:
  dir: both/
  vtu: extract.vtu