job: principal_directions
schema: adeli

model: ../data/small_box.vtk

zone:
  type: sphere
  center: [22, 22, -7]
  radius: 0.8

plot:
  title: "Probing stress state — average and spread"
  figsize: [9, 9]
  dpi: 300
  avg_directions:
    show: true
    markersize: 10
  cell_directions:
    show: true
    style: scatter
    markersize: 3
    alpha: 0.3

output:
  dir: scatter/