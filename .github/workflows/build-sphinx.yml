name: docs

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build_docs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies for PyVista
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgl1 \
            libglu1-mesa \
            xvfb

      - name: Install fem2geo
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          python -c "from importlib.metadata import version; print('Version:', version('fem2geo'))"

      - name: Build documentation
        run: |
          make -C docs clean
          xvfb-run -a make -C docs html